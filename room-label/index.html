<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Room Label Logger</title>
  <style>
    :root {
      --bg: #000000;
      --panel: #0d0d0d;
      --card: #1d1f23;
      --ink: #f5f5f5;
      --muted: #9ca3af;
      --line: #35373d;
      --yellow: #f4d13d;
      --blue: #3b9dff;
      --red: #ff5b7f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 10px 12px 12px;
      height: 100svh;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .top-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .log {
      flex: 1 1 auto;
      min-height: 200px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px;
      background: #111216;
    }

    .bottom {
      display: none;
    }

    .bottom-left {
      display: none;
    }

    .bottom-right {
      display: none;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .grid-top {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    button#clearBtn {
      grid-column: span 1;
    }

    button#downloadBtn {
      grid-column: span 2;
    }

    button {
      border: 1px solid #3a3d44;
      background: var(--card);
      color: #dbe2ea;
      border-radius: 12px;
      padding: 12px 12px;
      min-height: 64px;
      cursor: pointer;
      font-size: 1.02rem;
      font-weight: 600;
      transition: transform 120ms ease, filter 120ms ease;
    }

    button:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    button.room {
      color: var(--yellow);
    }

    button.action {
      color: var(--blue);
    }

    button.danger {
      color: var(--red);
    }

    button[data-room="tuin"],
    button[data-room="buiten"] {
      color: #22c55e;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      table-layout: fixed;
    }

    th:first-child, td:first-child {
      width: 66.67%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th:last-child, td:last-child {
      width: 33.33%;
      word-break: break-word;
    }

    th, td {
      text-align: left;
      border-bottom: 1px solid var(--line);
      padding: 6px;
      vertical-align: top;
    }

    th {
      background: #1c1e24;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .mono {
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.86rem;
    }

    .undo-redo-group {
      grid-column: span 1;
      display: flex;
      gap: 10px;
    }

    .undo-redo-group button {
      flex: 1;
      min-height: 64px;
      padding: 8px 4px;
      font-size: 1.4rem;
    }

    @media (max-width: 480px) {
      button {
        min-height: 58px;
        font-size: 0.98rem;
      }
      .undo-redo-group button {
        min-height: 58px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-section">
      <div class="grid-top" id="topControls"></div>
    </div>

    <div class="log" id="logContainer">
      <table>
        <thead>
          <tr>
            <th>ISO Tijd</th>
            <th>Ruimte</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>

    <div class="grid-3" id="roomButtons"></div>
  </div>

  <script>
    const ROOMS = [
      { value: "woonkamer", label: "Woonkamer" },
      { value: "keuken", label: "Keuken" },
      { value: "slaapkamer", label: "Slaapkamer" },
      { value: "badkamer", label: "Badkamer" },
      { value: "trap", label: "Trap" },
      { value: "inkom", label: "Inkom" },
      { value: "wc", label: "WC" },
      { value: "tuin", label: "Tuin" },
      { value: "buiten", label: "Buiten" }
    ];

    const STORAGE_KEY = "room-label-events-v1";

    const state = {
      events: [],
      history: [],
      historyIndex: -1
    };

    const logBody = document.getElementById("logBody");
    const logContainer = document.getElementById("logContainer");
    const roomButtonsWrap = document.getElementById("roomButtons");
    const topControlsWrap = document.getElementById("topControls");
    let csvFileHandle = null;

    function nowEvent(eventType, room = "") {
      const now = new Date();
      return {
        iso_time: now.toISOString(),
        epoch_ms: now.getTime(),
        event_type: eventType,
        room
      };
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed.events)) state.events = parsed.events;
        if (Array.isArray(parsed.history)) state.history = parsed.history;
        if (typeof parsed.historyIndex === 'number') state.historyIndex = parsed.historyIndex;
      } catch (_) {}
      
      // Initialize history if empty
      if (state.history.length === 0) {
        state.history.push(JSON.stringify(state.events));
        state.historyIndex = 0;
      }
    }

    async function addEvent(eventType, room = "") {
      const ev = nowEvent(eventType, room);
      state.events.push(ev);
      persist();
      render();
      await writeCsvToBoundFile();
      if (navigator.vibrate) navigator.vibrate(35);
    }

    function render() {
      logBody.innerHTML = "";
      state.events.forEach((ev) => {
        if (ev.event_type !== "enter_room") return;

        const tr = document.createElement("tr");
        tr.innerHTML = [
          `<td class="mono">${ev.iso_time}</td>`,
          `<td class="mono">${ev.room || ""}</td>`
        ].join("");
        logBody.appendChild(tr);
      });

      logContainer.scrollTop = logContainer.scrollHeight;
    }

    function toCsv(events) {
      const header = ["iso_time", "room"];
      const rows = events
        .filter((ev) => ev.event_type === "enter_room")
        .map((ev) => [
        ev.iso_time,
        ev.room || ""
      ]);
      return [header, ...rows]
        .map((cols) => cols.map((v) => `"${String(v).replaceAll('"', '""')}"`).join(","))
        .join("\n");
    }

    function downloadCsv() {
      if (!state.events.length) {
        alert("No events to download yet.");
        return;
      }

      const csv = toCsv(state.events);
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const ts = new Date().toISOString().replace(/[-:.]/g, "").replace("T", "_").slice(0, 15);
      const filename = `${ts}_room_labels.csv`;

      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function bindCsvFile() {
      if (!window.showSaveFilePicker) {
        alert("Direct opslaan naar hetzelfde bestand wordt niet ondersteund in deze browser. Je labels blijven wel lokaal bewaard.");
        return;
      }

      try {
        csvFileHandle = await window.showSaveFilePicker({
          suggestedName: "room_labels.csv",
          types: [{
            description: "CSV files",
            accept: { "text/csv": [".csv"] }
          }]
        });

        await writeCsvToBoundFile();
      } catch (_) {
        // User canceled picker or browser blocked write access.
      }
    }

    async function writeCsvToBoundFile() {
      if (!csvFileHandle) return;

      try {
        const writable = await csvFileHandle.createWritable();
        await writable.write(toCsv(state.events));
        await writable.close();
      } catch (_) {
        // Keep running even if file write fails.
      }
    }

    function wireButtons() {
      document.getElementById("undoBtn").addEventListener("click", () => {
        if (state.historyIndex > 0) {
          state.historyIndex--;
          state.events = JSON.parse(state.history[state.historyIndex]);
          persist();
          render();
          void writeCsvToBoundFile();
        }
      });

      document.getElementById("redoBtn").addEventListener("click", () => {
        if (state.historyIndex < state.history.length - 1) {
          state.historyIndex++;
          state.events = JSON.parse(state.history[state.historyIndex]);
          persist();
          render();
          void writeCsvToBoundFile();
        }
      });

      document.getElementById("clearBtn").addEventListener("click", () => {
        if (!confirm("Delete all current session events?")) return;
        state.events = [];
        state.history = [];
        state.historyIndex = -1;
        persist();
        render();
        void writeCsvToBoundFile();
      });

      document.getElementById("downloadBtn").addEventListener("click", downloadCsv);
    }

    function createRoomButtons() {
      // Top controls: Wissen + Download + Undo/Redo
      const clearBtn = document.createElement("button");
      clearBtn.id = "clearBtn";
      clearBtn.className = "danger";
      clearBtn.textContent = "Wissen";
      topControlsWrap.appendChild(clearBtn);

      const downloadBtn = document.createElement("button");
      downloadBtn.id = "downloadBtn";
      downloadBtn.className = "action";
      downloadBtn.textContent = "Download";
      topControlsWrap.appendChild(downloadBtn);

      const undoRedoGroup = document.createElement("div");
      undoRedoGroup.className = "undo-redo-group";

      const undoBtn = document.createElement("button");
      undoBtn.id = "undoBtn";
      undoBtn.className = "action";
      undoBtn.textContent = "←";
      undoRedoGroup.appendChild(undoBtn);

      const redoBtn = document.createElement("button");
      redoBtn.id = "redoBtn";
      redoBtn.className = "action";
      redoBtn.textContent = "→";
      undoRedoGroup.appendChild(redoBtn);

      topControlsWrap.appendChild(undoRedoGroup);

      // Room buttons (9 total in grid)
      ROOMS.forEach((roomInfo) => {
        const btn = document.createElement("button");
        btn.className = "room";
        btn.setAttribute("data-room", roomInfo.value);
        btn.textContent = roomInfo.label;
        btn.addEventListener("click", async () => {
          // Add event first
          await addEvent("enter_room", roomInfo.value);
          
          // Save new state to history after event is added
          const newState = JSON.stringify(state.events);
          if (state.historyIndex < state.history.length - 1) {
            state.history.splice(state.historyIndex + 1);
          }
          state.history.push(newState);
          state.historyIndex = state.history.length - 1;
        });
        roomButtonsWrap.appendChild(btn);
      });
    }

    loadState();
    createRoomButtons();
    wireButtons();
    render();
  </script>
</body>
</html>
