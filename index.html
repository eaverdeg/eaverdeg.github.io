<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Panel Configurator</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div id="controls">
    <button id="add40">Add 40x200 Panel</button>
    <button id="add80">Add 80x200 Panel</button>
    <button id="rotate">Rotate Panel</button>
    <button id="remove">Remove Panel</button>
    <span id="orientationDisplay">Orientation: 0°</span>
  </div>
  <canvas id="grid" width="800" height="600"></canvas>
</body>
</html>
